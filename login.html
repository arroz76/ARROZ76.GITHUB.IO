<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Corsair</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="login-page">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="img/Logo-Corsair.png" alt="Corsair Logo" class="logo-login">
                <h2>MI CUENTA</h2>
            </div>

            <form class="login-form">
                <div class="input-field">
                    <i class="bi bi-person"></i>
                    <input type="text" placeholder="Correo o Usuario" required>
                </div>

                <div class="input-field">
                    <i class="bi bi-lock"></i>
                    <input type="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-corsair-login">ENTRAR</button>

                <div class="form-footer">
                    <a href="#" class="footer-link">¿Olvidaste tu contraseña?</a>
                    <hr>
                    <a href="index.html" class="back-link">
                        <i class="bi bi-arrow-left"></i> Volver a la tienda
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
